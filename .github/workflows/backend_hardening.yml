name: backend-hardening

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  hardening:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff mypy

      - name: Ruff lint
        run: |
          ruff check . || true

      - name: Type inspection
        run: |
          mypy membra_kpi || true

      - name: Smoke import
        run: |
          python -c "import membra_kpi"
          python -c "from membra_kpi.product_router import build_product_router"
          python -c "from membra_kpi.infinite_kpi import build_infinite_kpi_production_plan"
          python -c "from membra_kpi.hypermodular_databits import build_hypermodular_sentence_backing"

      - name: Basic API startup test
        run: |
          python -m py_compile app.py
