name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
      DB_PATH: ./data/test-membra.db
      UPLOAD_DIR: ./static/test-uploads
      ADMIN_TOKEN: test-admin-token
      RATE_LIMIT_REQUESTS: 10000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q
