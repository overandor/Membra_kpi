services:
  - type: web
    name: membra-kpi-api
    runtime: python
    plan: starter
    region: oregon
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      python scripts/apply_migrations.py
      python -m py_compile app.py
    startCommand: |
      uvicorn app:app --host 0.0.0.0 --port $PORT
    disk:
      name: membra-kpi-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: membra-kpi-api.onrender.com,.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_PATH
        value: /data/membra.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: MAX_UPLOAD_MB
        value: 12
      - key: RATE_LIMIT_REQUESTS
        value: 120
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: ADMIN_TOKEN_SHA256
        sync: false
      - key: MEMBRA_EVENT_SECRET
        sync: false
      - key: MEMBRA_EVENT_SINKS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_TIMEOUT_SECONDS
        value: 30
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
